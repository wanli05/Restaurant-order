<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Kitchen System</title>
    <meta name="app-version" content="1.0.0" />
    <link rel="stylesheet" href="/css/staff-settings.css" />
    <style>
      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP",
          "Noto Sans SC", Arial, sans-serif;
        background: #0f172a;
        color: #e5e7eb;
        padding: 12px;
      }

      button {
        min-height: 36px;
        border: 1px solid #334155;
        border-radius: 10px;
        background: #f8fafc;
        color: #0f172a;
        font: inherit;
        cursor: pointer;
      }

      button:focus-visible {
        outline: 2px solid #60a5fa;
        outline-offset: 1px;
      }

      .lang-bar {
        margin-bottom: 10px;
        display: inline-flex;
        gap: 8px;
        padding: 4px;
        background: rgba(148, 163, 184, 0.16);
        border-radius: 12px;
      }

      .lang-bar button {
        border-color: #475569;
        background: #e2e8f0;
      }
      .top-nav {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 12px;
      }
      .top-nav button {
        min-height: 38px;
        border: 1px solid #475569;
        border-radius: 10px;
        background: #e2e8f0;
        color: #0f172a;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      .open-warning {
        margin: 0 0 12px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #fecaca;
        background: #fff1f2;
        color: #b91c1c;
        font-weight: 600;
      }
      .open-warning.open {
        border-color: #86efac;
        background: #f0fdf4;
        color: #166534;
      }

      .panel {
        background: rgba(15, 23, 42, 0.72);
        border: 1px solid rgba(148, 163, 184, 0.24);
        border-radius: 12px;
        padding: 10px;
      }

      .panel-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 0 0 10px 0;
      }

      .count-badge {
        min-width: 28px;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 13px;
        background: rgba(148, 163, 184, 0.24);
        color: #f8fafc;
        text-align: center;
      }

      /* 订单卡片 */
      .order-card {
        border: 1px solid #cbd5e1;
        margin-bottom: 12px;
        padding: 12px;
        border-radius: 10px;
        background: #f8fafc;
        color: #0f172a;
        position: relative;
        box-shadow: 0 8px 18px rgba(2, 6, 23, 0.22);
      }

      /* 历史订单样式（半透明，小一点） */
      .history-card {
        opacity: 0.98;
        background: linear-gradient(180deg, #e9eef6 0%, #dde6f2 100%);
        transform: scale(0.985);
        margin-bottom: 10px;
        border-color: #bfcee3;
      }

      .order-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #d5deea;
        padding-bottom: 8px;
        margin-bottom: 12px;
      }

      .order-no {
        font-family: monospace;
        background: #1e293b;
        color: #f8fafc;
        padding: 4px 10px;
        border-radius: 8px;
        font-size: 1em;
      }

      .wait-warning {
        color: #dc2626;
        font-weight: bold;
        background: #fee2e2;
        border: 1px solid #fecaca;
        border-radius: 999px;
        padding: 2px 8px;
        animation: none;
      }

      @keyframes blink {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
        100% {
          opacity: 1;
        }
      }

      .item-row {
        font-size: 1.1em;
        margin: 8px 0;
        border-left: 4px solid #22c55e;
        padding-left: 12px;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .item-btn {
        padding: 8px 12px;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 0.9em;
        font-weight: 600;
        min-height: 36px;
      }

      .item-btn.done {
        background: #16a34a;
      }

      .item-btn.pending {
        background: #ea580c;
      }

      .item-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .ui-alert-modal {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.42);
        backdrop-filter: blur(2px);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 18px;
        z-index: 1200;
      }

      .ui-alert-modal.show {
        display: flex;
      }

      .ui-alert-card {
        width: min(520px, 100%);
        background: #fff;
        border: 1px solid #dbe2ea;
        border-radius: 16px;
        padding: 16px;
        max-height: 78vh;
        overflow: auto;
        box-shadow: 0 14px 34px rgba(2, 6, 23, 0.26);
      }

      .ui-alert-message {
        margin: 0 0 12px 0;
        color: #0f172a;
        line-height: 1.5;
        white-space: pre-wrap;
      }

      .ui-alert-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }
      .ui-alert-actions button {
        min-width: 72px;
        min-height: 38px;
      }

      @media (min-width: 768px) {
        body {
          max-width: 1180px;
          margin: 0 auto;
          padding: 16px;
        }

        .kitchen-grid {
          display: grid;
          grid-template-columns: 1.6fr 1fr;
          gap: 14px;
          align-items: start;
        }

        .panel {
          min-height: 72vh;
          max-height: 78vh;
          overflow: auto;
        }

        h1 {
          margin: 0 0 12px 0;
        }

        h2 {
          margin: 0 0 10px 0;
        }
      }

      @media (min-width: 1024px) {
        body {
          max-width: 1320px;
          padding: 20px;
        }

        .item-row {
          font-size: 1.2em;
        }
      }
    </style>
  </head>

  <body>
    <div class="admin-header-row">
      <div class="lang-bar">
        <button onclick="setLang('ja')">日本語</button>
        <button onclick="setLang('zh')">中文</button>
      </div>
      <div class="admin-settings-wrap">
        <button
          type="button"
          id="adminSettingsTrigger"
          class="admin-settings-trigger"
          aria-expanded="false"
          aria-haspopup="true"
          aria-controls="adminSettingsMenu"
          title=""
        >
          ⚙
        </button>
        <div id="adminSettingsMenu" class="admin-settings-menu" role="menu" aria-labelledby="adminSettingsTrigger">
          <button type="button" role="menuitem" id="adminSettingsMenuTotpBtn"></button>
          <button type="button" role="menuitem" id="adminSettingsMenuTokenBtn"></button>
          <button type="button" role="menuitem" id="adminSettingsMenuAboutBtn"></button>
        </div>
      </div>
    </div>
    <div class="top-nav">
      <button
        id="navAdminBtn"
        type="button"
        onclick="openModule('/admin.html')"
      ></button>
      <button
        id="navKitchenBtn"
        type="button"
        onclick="openModule('/kitchen.html')"
      ></button>
      <button
        id="navFinanceBtn"
        type="button"
        onclick="openModule('/finance.html')"
      ></button>
      <button
        id="navRecoveryBtn"
        type="button"
        onclick="openModule('/recovery.html')"
      ></button>
    </div>
    <h1 id="pageTitle"></h1>
    <div id="openWarning" class="open-warning"></div>

    <div class="kitchen-grid">
      <div class="panel">
        <h2 class="panel-title">
          <span id="activeTitle"></span>
          <span id="activeCount" class="count-badge">0</span>
        </h2>
        <div id="active-orders"></div>
      </div>
      <div class="panel">
        <h2 class="panel-title">
          <span id="historyTitle"></span>
          <span id="historyCount" class="count-badge">0</span>
        </h2>
        <div id="history-orders"></div>
      </div>
    </div>
    <div id="uiAlertModal" class="ui-alert-modal">
      <div class="ui-alert-card">
        <p id="uiAlertMessage" class="ui-alert-message"></p>
        <div class="ui-alert-actions">
          <button id="uiAlertOkBtn" type="button">OK</button>
        </div>
      </div>
    </div>

    <div id="adminTokenHelpModal" class="modal">
      <div class="modal-content admin-settings-modal-card">
        <div class="edit-order-head">
          <h3 id="adminTokenHelpTitle"></h3>
          <button type="button" id="adminTokenHelpCloseBtn" aria-label="Close">×</button>
        </div>
        <p id="adminTokenHelpBody" class="edit-order-sub" style="white-space: pre-line; margin-bottom: 14px"></p>
        <div class="manager-totp-enroll-actions">
          <button type="button" id="adminTokenHelpReloginBtn" class="manager-paid-edit-btn manager-paid-edit-btn--primary"></button>
        </div>
      </div>
    </div>
    <div id="adminAboutModal" class="modal">
      <div class="modal-content admin-settings-modal-card">
        <div class="edit-order-head">
          <h3 id="adminAboutTitle"></h3>
          <button type="button" id="adminAboutCloseBtn" aria-label="Close">×</button>
        </div>
        <p id="adminAboutVersion" class="admin-about-version"></p>
        <p id="adminAboutBody" class="admin-about-body"></p>
        <div class="manager-totp-enroll-actions">
          <button type="button" id="adminAboutOkBtn" class="manager-paid-edit-btn manager-paid-edit-btn--primary"></button>
        </div>
      </div>
    </div>
    <div id="adminTotpRotateModal" class="modal">
      <div class="modal-content admin-settings-modal-card">
        <div class="edit-order-head">
          <h3 id="adminTotpRotateTitle"></h3>
          <button type="button" id="adminTotpRotateCloseBtn" aria-label="Close">×</button>
        </div>
        <p id="adminTotpRotateHint" class="edit-order-sub" style="margin-bottom: 10px"></p>
        <label style="display: flex; flex-direction: column; gap: 6px">
          <span id="adminTotpRotateLabel" style="font-size: 13px; font-weight: 500; color: #334155"></span>
          <input
            id="adminTotpRotateInput"
            class="manager-paid-edit-reason-input"
            type="text"
            inputmode="numeric"
            maxlength="8"
            autocomplete="one-time-code"
          />
        </label>
        <div class="manager-totp-enroll-actions">
          <button type="button" id="adminTotpRotateCancelBtn" class="manager-paid-edit-btn"></button>
          <button type="button" id="adminTotpRotateNextBtn" class="manager-paid-edit-btn manager-paid-edit-btn--primary"></button>
        </div>
      </div>
    </div>
    <div id="managerTotpEnrollModal" class="modal">
      <div class="modal-content manager-totp-enroll-modal-card">
        <div class="edit-order-head">
          <h3 id="managerTotpEnrollModalTitle"></h3>
          <button type="button" id="managerTotpEnrollModalCloseBtn">×</button>
        </div>
        <p id="managerTotpEnrollModalIntro" class="edit-order-sub"></p>
        <div class="manager-totp-enroll-panel-inner">
          <img id="managerTotpQrImg" alt="" width="220" height="220" style="display: block; margin: 0 auto; image-rendering: pixelated" />
          <p id="managerTotpSecretCaption" style="margin: 12px 0 4px; font-size: 13px; color: #64748b"></p>
          <code id="managerTotpSecretText" style="display: block; word-break: break-all; font-size: 13px; margin-bottom: 12px"></code>
          <label style="display: flex; flex-direction: column; gap: 6px">
            <span id="managerTotpConfirmLabel" style="font-size: 13px; font-weight: 500; color: #334155"></span>
            <input
              id="managerTotpConfirmInput"
              class="manager-paid-edit-reason-input"
              type="text"
              inputmode="numeric"
              maxlength="8"
              autocomplete="one-time-code"
            />
          </label>
          <div class="manager-totp-enroll-actions">
            <button type="button" id="managerTotpCancelBtn" class="manager-paid-edit-btn"></button>
            <button type="button" id="managerTotpConfirmBtn" class="manager-paid-edit-btn manager-paid-edit-btn--primary"></button>
          </div>
        </div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/shared/staff-auth.js"></script>
    <script src="/js/shared/staff-settings-ui.js"></script>
    <script src="/js/kitchen/main.js"></script>
  </body>
</html>
